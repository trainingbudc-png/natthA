<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 3 | ตรวจก่อนสอบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- 📌 อ้างอิงไฟล์ CSS กลาง -->
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        .info-box { background-color: #fff7ed; border: 1px solid #ffedd5; border-radius: 12px; padding: 15px; margin-bottom: 25px; }
        .info-label { font-size: 0.85rem; color: #9a3412; margin-bottom: 2px; }
        .info-value { font-size: 1.1rem; font-weight: bold; color: #c2410c; }
        .divider { width: 1px; background-color: #fed7aa; height: 40px; }
        
        .input-admin-name { font-size: 1.1rem; font-weight: bold; color: #c2410c; border: 1px dashed #fdba74; background: transparent; text-align: center; border-radius: 6px; width: 150px; padding: 2px; }
        .input-admin-name:focus { outline: none; border-color: #f97316; background: white; }
        
        .radio-group label { border-radius: 8px; font-weight: 500; }
        .hint-box { border-radius: 8px; font-size: 0.95rem; display: none; }
    </style>
</head>
<body>

<div class="container-wide">
    <div class="card-custom">
        <h4 class="text-center fw-bold text-dark mb-4">♻️ [Step 3] Check List ก่อนสอบ</h4>
        
        <div class="info-box d-flex justify-content-around align-items-center">
            <div class="text-center">
                <div class="info-label">🔖 เลขรายการ:</div>
                <div id="displayReqId" class="info-value">กำลังโหลด...</div>
            </div>
            <div class="divider"></div>
            <div class="text-center">
                <div class="info-label">👨‍💻 ผู้ตรวจสอบ:</div>
                <input type="text" id="inspectorName" class="input-admin-name" placeholder="พิมพ์ชื่อผู้ตรวจ">
            </div>
        </div>
        
        <div class="mb-4">
            <label class="form-label">เลือกระบบการสอบ:</label>
            <div class="d-flex flex-wrap gap-2 radio-group">
                <input type="radio" class="btn-check" name="examType" id="osce" value="OSCE" checked onclick="handleExamChange(this.value)">
                <label class="btn btn-outline-primary px-4" for="osce">OSCE</label>
                
                <input type="radio" class="btn-check" name="examType" id="exam" value="Exam+" onclick="handleExamChange(this.value)">
                <label class="btn btn-outline-primary px-4" for="exam">Exam+</label>
                
                <input type="radio" class="btn-check" name="examType" id="crq" value="CRQ" onclick="handleExamChange(this.value)">
                <label class="btn btn-outline-primary px-4" for="crq">CRQ</label>
                
                <input type="radio" class="btn-check" name="examType" id="none" value="ไม่ได้สอบ" onclick="handleExamChange(this.value)">
                <label class="btn btn-outline-danger px-4" for="none">ไม่ได้สอบ</label>
            </div>
            
            <div id="examHint" class="alert alert-info hint-box mt-3 py-2 px-3 border-info text-dark">
                <strong>💡 คำแนะนำ [Exam+]:</strong> ไม่ต้องปิด Bluetooth เนื่องจากปากกาต้องใช้ Bluetooth[cite: 20]
            </div>

            <div id="noteContainer" class="mt-3" style="display:none;">
                <input type="text" id="reasonNote" class="form-control border-danger" placeholder="⚠️ ระบุเหตุผลที่ไม่ได้สอบ...">
            </div>
        </div>

        <div class="table-wrapper mb-4">
            <table class="table">
                <thead>
                    <tr>
                        <th>iPad</th>
                        <th>Logout Drive</th>
                        <th>ปิด Wi-Fi</th>
                        <th>ปิด Bluetooth</th>
                        <th>ปิด AirDrop</th>
                        <th>โหมดเครื่องบิน</th>
                        <th>เริ่มใช้งาน</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="itemList">
                    <tr><td colspan="8" class="text-muted py-4 text-center">กำลังโหลดรายการ iPad... ⏳</td></tr>
                </tbody>
            </table>
        </div>

        <button id="btnSubmitStep3" class="btn-custom" onclick="saveStep3()" style="background-color: #f97316; color: white;">💾 ยืนยันเครื่องพร้อมสอบ</button>
        <button class="btn-custom btn-outline-custom mt-3" onclick="window.location.href='user.html'">⬅️ กลับหน้าหลัก</button>
    </div>
</div>

<!-- 📌 โหลดไฟล์ Scripts -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script.js"></script>

<script>
    const reqId = new URLSearchParams(window.location.search).get('reqId');

    function handleExamChange(examType) {
        const hintBox = document.getElementById('examHint');
        const noteContainer = document.getElementById('noteContainer');
        const reasonNote = document.getElementById('reasonNote');

        hintBox.style.display = 'none';
        noteContainer.style.display = 'none';

        if (examType === 'Exam+') {
            hintBox.style.display = 'block';
            reasonNote.value = '';
        } else if (examType === 'ไม่ได้สอบ') {
            noteContainer.style.display = 'block';
        } else {
            reasonNote.value = '';
        }
    }

    window.onload = async function() {
        document.getElementById('displayReqId').innerText = reqId || "ไม่พบข้อมูล";
        
        const savedName = localStorage.getItem("userName");
        if(savedName) document.getElementById('inspectorName').value = savedName;

        if(!reqId) {
            Swal.fire("ข้อผิดพลาด", "ไม่พบหมายเลขรายการ กรุณาเข้าผ่านหน้าหลัก", "error").then(() => window.location.href = "user.html");
            return;
        }

        try {
            const res = await callAPI({ action: "getStep2Data", reqId: reqId });
            const tbody = document.getElementById('itemList');
            tbody.innerHTML = "";
            
            if(res.data && res.data.length > 0) {
                res.data.forEach(item => {
                    tbody.innerHTML += `<tr data-ipad="${item.ipadId}">
                        <td class="fw-bold text-primary">${item.ipadId}</td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><button type="button" class="btn btn-outline-primary btn-sm fw-bold rounded-pill px-3" onclick="checkAllInRow(this)">✔ ติ๊กครบ</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="8" class="text-danger py-4 text-center">❌ ไม่พบข้อมูล iPad สำหรับรายการนี้</td></tr>`;
            }
        } catch (err) {
            document.getElementById('itemList').innerHTML = `<tr><td colspan="8" class="text-danger py-4 text-center">❌ เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์</td></tr>`;
        }
    };

    function checkAllInRow(btn) {
        const row = btn.closest('tr');
        row.querySelectorAll('.check-item').forEach(cb => cb.checked = true);
    }

    async function saveStep3() {
        const btn = document.getElementById('btnSubmitStep3');
        let inspector = document.getElementById('inspectorName').value.trim() || "Admin (ไม่ระบุชื่อ)";

        btn.innerHTML = "⏳ กำลังบันทึกข้อมูล..."; 
        btn.disabled = true;
        
        const examValue = document.querySelector('input[name="examType"]:checked').value;
        const noteValue = document.getElementById('reasonNote').value;
        
        let items = [];
        document.querySelectorAll('#itemList tr[data-ipad]').forEach(row => {
            const checks = Array.from(row.querySelectorAll('.check-item')).map(c => c.checked ? "☑" : "☐");
            items.push({ ipadId: row.dataset.ipad, checks: checks });
        });

        if(items.length === 0) {
            Swal.fire("แจ้งเตือน", "ไม่มีข้อมูล iPad ให้บันทึกครับ", "warning");
            btn.innerHTML = "💾 ยืนยันเครื่องพร้อมสอบ"; 
            btn.disabled = false; 
            return;
        }
        
        try {
            const result = await callAPI({ 
                action: "saveStep3", 
                reqId: reqId, 
                items: items, 
                exam: examValue, 
                note: noteValue, 
                name: inspector 
            });
            
            if(result.status === "success") {
                const summary = `เลขรายการ: ${reqId}`;
                // ใช้หน้า success.html เพื่อแสดงว่าบันทึกสำเร็จ
                window.location.href = `success.html?title=ตรวจก่อนสอบสำเร็จ&desc=บันทึกข้อมูล Check List เรียบร้อยแล้ว&summary=${encodeURIComponent(summary)}`;
            } else {
                Swal.fire("ผิดพลาด", result.message, "error");
                btn.innerHTML = "💾 ยืนยันเครื่องพร้อมสอบ"; 
                btn.disabled = false;
            }
        } catch (error) {
            Swal.fire("ผิดพลาด", "เกิดข้อผิดพลาดในการเชื่อมต่อ", "error");
            btn.innerHTML = "💾 ยืนยันเครื่องพร้อมสอบ"; 
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
