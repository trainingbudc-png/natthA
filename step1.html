<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1 | เตรียมเครื่อง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Kanit', sans-serif; color: #333; }
        .card-custom { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-title { color: #dc3545; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h3 class="header-title text-center mb-4">📦 Step 1 | เตรียมเครื่อง iPad</h3>
        
        <div class="card card-custom p-4 mx-auto" style="max-width: 600px;">
            <form id="step1Form">
                <div class="mb-3">
                    <label class="form-label fw-bold">เลือกผู้ขอเบิกยืม (ผู้ใช้งาน):</label>
                    <select id="userNameSelect" class="form-select" required>
                        <option value="">กำลังโหลดรายชื่อ...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">เลือกเครื่อง iPad ที่ว่าง (เลือกได้มากกว่า 1):</label>
                    <select id="ipadSelect" class="form-select" multiple size="4" required>
                        <option value="">กำลังโหลดคลัง iPad...</option>
                    </select>
                    <small class="text-muted">*กด Ctrl (Windows) หรือ Command (Mac) ค้างไว้เพื่อเลือกหลายเครื่อง</small>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">สิ่งที่แอดมินต้องเตรียม (เช็คให้ครบ):</label>
                    <div class="form-check"><input class="form-check-input check-item" type="checkbox" id="checkDrive" value="Google Drive"><label class="form-check-label" for="checkDrive">ล็อกอิน Google Drive เรียบร้อย</label></div>
                    <div class="form-check"><input class="form-check-input check-item" type="checkbox" id="checkFile" value="ไฟล์เอกสาร"><label class="form-check-label" for="checkFile">ดาวน์โหลดไฟล์เอกสารครบถ้วน</label></div>
                    <div class="form-check"><input class="form-check-input check-item" type="checkbox" id="checkImg" value="ไฟล์รูปภาพ"><label class="form-check-label" for="checkImg">บันทึกไฟล์รูปภาพลงเครื่อง</label></div>
                    <div class="form-check"><input class="form-check-input check-item" type="checkbox" id="checkSafari" value="Safari"><label class="form-check-label" for="checkSafari">เคลียร์ประวัติ Safari เรียบร้อย</label></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">หมายเหตุ (ถ้ามี):</label>
                    <input type="text" id="noteInput" class="form-control" placeholder="เช่น เตรียมให้ก่อน 10 โมง">
                </div>

                <button type="button" class="btn btn-primary w-100 fw-bold py-2" id="submitBtn" onclick="submitStep1()">✅ ยืนยันการเตรียมเครื่อง</button>
            </form>
        </div>
        <div class="text-center mt-3"><a href="admin.html" class="text-secondary">⬅️ กลับหน้าเมนูผู้ดูแล</a></div>
    </div>

<script>
    // ⚠️ เปลี่ยนเป็นลิงก์ API ของพี่ด้วยนะครับ!
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    
    window.onload = function() {
        if(localStorage.getItem("userRole") !== "Admin") { alert("เฉพาะแอดมินเท่านั้น"); window.location.href="index.html"; return; }
        loadUsersAndIpads();
    };

    function loadUsersAndIpads() {
        // โหลดรายชื่อผู้ใช้งาน
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getUserNames" }) })
        .then(res => res.json())
        .then(res => {
            const select = document.getElementById("userNameSelect");
            select.innerHTML = '<option value="">-- เลือกชื่อผู้ขอยืม --</option>';
            if(res.status === "success" && res.data.length > 0) {
                res.data.forEach(name => { select.innerHTML += `<option value="${name}">${name}</option>`; });
            }
        });

        // โหลด iPad ว่าง
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getInventory" }) })
        .then(res => res.json())
        .then(res => {
            const ipadSelect = document.getElementById("ipadSelect");
            ipadSelect.innerHTML = "";
            if(res.status === "success" && res.data.length > 0) {
                res.data.forEach(id => { ipadSelect.innerHTML += `<option value="${id}">${id}</option>`; });
            } else { ipadSelect.innerHTML = '<option value="">ไม่มีเครื่องว่างในคลัง</option>'; }
        });
    }

    function submitStep1() {
        const recipientName = document.getElementById("userNameSelect").value;
        const ipadSelect = document.getElementById("ipadSelect");
        const note = document.getElementById("noteInput").value;
        const adminName = localStorage.getItem("userName") || "Admin";
        
        let selectedIpads = Array.from(ipadSelect.selectedOptions).map(opt => opt.value);

        if(!recipientName) return alert("กรุณาเลือกชื่อผู้ขอยืม");
        if(selectedIpads.length === 0) return alert("กรุณาเลือก iPad อย่างน้อย 1 เครื่อง");
        
        // เช็คว่าติ๊กครบไหม
        const checks = document.querySelectorAll('.check-item');
        let allChecked = true;
        checks.forEach(c => { if(!c.checked) allChecked = false; });
        if(!allChecked) return alert("กรุณาเตรียมเครื่องและติ๊กถูกให้ครบทุกข้อครับ");

        const btn = document.getElementById("submitBtn");
        btn.innerHTML = "กำลังบันทึกข้อมูล... ⏳";
        btn.disabled = true;

        const ipadData = selectedIpads.map(id => ({
            id: id,
            drive: document.getElementById("checkDrive").checked,
            file: document.getElementById("checkFile").checked,
            img: document.getElementById("checkImg").checked,
            safari: document.getElementById("checkSafari").checked
        }));

        // 📌 ข้อมูลที่จะส่งไป Code.gs (ต้องมี recipientName แน่นอน)
        const payload = {
            action: "saveStep1",
            adminName: adminName,
            recipientName: recipientName,
            note: note ? `เตรียมให้: ${recipientName} (${selectedIpads.length} เครื่อง) | ` + note : `เตรียมให้: ${recipientName} (${selectedIpads.length} เครื่อง)`,
            ipadData: ipadData
        };

        fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                alert(`✅ บันทึกสำเร็จ! หมายเลขรายการ: ${res.reqId}\nระบบได้ส่งแจ้งเตือนไปที่ LINE ของผู้ยืมแล้ว`);
                window.location.href = "admin.html";
            } else {
                alert("❌ เกิดข้อผิดพลาด: " + res.message);
                btn.innerHTML = "✅ ยืนยันการเตรียมเครื่อง";
                btn.disabled = false;
            }
        }).catch(err => {
            alert("❌ ระบบขัดข้อง");
            btn.innerHTML = "✅ ยืนยันการเตรียมเครื่อง";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
