<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | iPad Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Kanit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .main-card { background: white; padding: 50px 40px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); width: 100%; max-width: 450px; text-align: center; }
        
        /* =========================================
           ✨ อัปเกรด UI: หน้าจอโหลดเชื่อมต่อ LINE ✨
           ========================================= */
        .loading-section { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .logo-wrapper { position: relative; margin-bottom: 25px; display: inline-flex; align-items: center; justify-content: center; }
        .line-icon { width: 85px; height: 85px; position: relative; z-index: 2; }
        
        /* เอฟเฟกต์คลื่นกระเพื่อมหลังโลโก้ */
        .pulse-ring {
            position: absolute;
            width: 85px; height: 85px;
            background-color: #06C755;
            border-radius: 50%;
            z-index: 1;
            animation: pulseAnim 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes pulseAnim {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* เอฟเฟกต์จุดโหลดดิ้ง 3 จุด */
        .loading-dots { margin-top: 10px; height: 20px; }
        .loading-dots span {
            display: inline-block; width: 10px; height: 10px;
            background-color: #06C755; border-radius: 50%; margin: 0 4px;
            animation: bounceAnim 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounceAnim {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        #mainText { font-size: 1.3rem; letter-spacing: 0.5px; }
        #subText { font-size: 0.95rem; }

        /* =========================================
           สไตล์ฟอร์มลงทะเบียน (ซ่อนไว้ก่อน)
           ========================================= */
        .register-section { display: none; text-align: left; }
        .form-control { border-radius: 12px; padding: 14px; border: 1px solid #e2e8f0; font-size: 1rem; }
        .form-control:focus { border-color: #10b981; box-shadow: 0 0 0 0.25rem rgba(16, 185, 129, 0.25); }
        .btn-success { background: #10b981; border: none; border-radius: 12px; padding: 14px; font-weight: bold; font-size: 1.1rem; width: 100%; transition: 0.3s; margin-top: 20px; }
        .btn-success:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(16,185,129,0.2); }
        .form-label { font-weight: 600; color: #475569; font-size: 0.9rem; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="main-card">
    
    <!-- 🟢 ส่วนที่ 1: หน้าจอโหลดเชื่อมต่อ LINE (ดีไซน์ใหม่) -->
    <div id="loadingSection" class="loading-section">
        <div class="logo-wrapper">
            <div class="pulse-ring" id="pulseRing"></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" alt="LINE" class="line-icon">
        </div>
        
        <h4 class="fw-bold text-dark" id="mainText">กำลังตรวจสอบบัญชี</h4>
        
        <div class="loading-dots" id="spinnerIcon">
            <span></span><span></span><span></span>
        </div>
        
        <p class="text-muted mt-2" id="subText">ระบบกำลังเชื่อมต่อข้อมูลกับแอป LINE</p>
    </div>

    <!-- 🟡 ส่วนที่ 2: ฟอร์มลงทะเบียนสำหรับผู้ใช้ใหม่ (ซ่อนไว้เป็นค่าเริ่มต้น) -->
    <div id="registerSection" class="register-section">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-dark mb-1">📝 ข้อมูลผู้ใช้งานครั้งแรก</h4>
            <p class="text-muted" style="font-size: 0.85rem;">กรุณาเติมข้อมูลให้ครบถ้วนเพื่อเปิดใช้งานระบบ</p>
        </div>
        
        <input type="hidden" id="hiddenUserId">

        <div class="mb-3">
            <label class="form-label">ชื่อ-นามสกุล</label>
            <input type="text" id="regName" class="form-control" placeholder="ชื่อ-นามสกุลของคุณ (แก้ไขได้)">
        </div>
        <div class="mb-3">
            <label class="form-label">ฝ่าย / แผนก</label>
            <input type="text" id="regDept" class="form-control" placeholder="เช่น ไอที, ทันตกรรม, ศัลยกรรม">
        </div>
        <div class="mb-4">
            <label class="form-label">เบอร์ติดต่อภายใน (หรือมือถือ)</label>
            <input type="text" id="regPhone" class="form-control" placeholder="กรอกเบอร์ที่สามารถติดต่อได้">
        </div>
        
        <button class="btn btn-success" id="btnRegister" onclick="submitRegistration()">✅ ยืนยันข้อมูล & เข้าใช้งาน</button>
    </div>

</div>

<!-- โหลด LINE LIFF SDK -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    
    // ฝัง LIFF ID
    const MY_LIFF_ID = "2010557323-PAyWhGxW"; 

    window.onload = async () => {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            const profile = await liff.getProfile();
            const displayName = profile.displayName;
            const userId = profile.userId.slice(0, 8); 

            document.getElementById('subText').innerText = `สวัสดีคุณ ${displayName} กำลังตรวจสอบสิทธิ์...`;
            
            checkUserInDatabase(userId, displayName);

        } catch (err) {
            console.error("LIFF Error:", err);
            showError("เกิดข้อผิดพลาดในการเชื่อมต่อ", "กรุณาเปิดลิงก์ผ่านแอปพลิเคชัน LINE");
        }
    };

    async function checkUserInDatabase(userId, displayName) {
        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "checkRole", userId: userId })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('mainText').innerText = "✅ ยืนยันตัวตนสำเร็จ";
                document.getElementById('subText').innerText = "กำลังพาท่านเข้าสู่ระบบ...";
                document.getElementById('spinnerIcon').style.display = "none";
                document.getElementById('pulseRing').style.display = "none";
                
                localStorage.setItem("userName", data.name);
                localStorage.setItem("userRole", data.role);
                
                setTimeout(() => {
                    window.location.href = data.role === "Admin" ? "admin.html" : "user.html";
                }, 1000);
            } else {
                document.getElementById('loadingSection').style.display = "none";
                document.getElementById('registerSection').style.display = "block";
                
                document.getElementById('hiddenUserId').value = userId;
                document.getElementById('regName').value = displayName; 
            }
        } catch (error) {
            showError("เซิร์ฟเวอร์ไม่ตอบสนอง", "ไม่สามารถตรวจสอบข้อมูลกับฐานข้อมูลได้");
        }
    }

    async function submitRegistration() {
        const userId = document.getElementById('hiddenUserId').value;
        const name = document.getElementById('regName').value.trim();
        const dept = document.getElementById('regDept').value.trim();
        const phone = document.getElementById('regPhone').value.trim();

        if (!name || !dept || !phone) {
            return alert("⚠️ กรุณากรอกข้อมูลให้ครบถ้วนทุกช่องครับ");
        }

        const btn = document.getElementById('btnRegister');
        btn.innerText = "⏳ กำลังบันทึกข้อมูล..."; btn.disabled = true;

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "registerUser", 
                    userId: userId, 
                    name: name, 
                    role: "User", 
                    dept: dept, 
                    phone: phone 
                })
            });
            const data = await res.json();

            if (data.status === "success") {
                alert("✅ ลงทะเบียนสำเร็จ! ระบบกำลังพาท่านเข้าสู่ระบบ...");
                localStorage.setItem("userName", name);
                localStorage.setItem("userRole", "User");
                window.location.href = "user.html";
            } else {
                alert("❌ เกิดข้อผิดพลาดในการบันทึก");
                btn.innerText = "✅ ยืนยันข้อมูล & เข้าใช้งาน"; btn.disabled = false;
            }
        } catch (error) {
            alert("❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้");
            btn.innerText = "✅ ยืนยันข้อมูล & เข้าใช้งาน"; btn.disabled = false;
        }
    }

    function showError(main, sub) {
        document.getElementById('spinnerIcon').style.display = "none";
        document.getElementById('pulseRing').style.display = "none";
        document.getElementById('mainText').innerText = "❌ " + main;
        document.getElementById('mainText').classList.add("text-danger");
        document.getElementById('subText').innerText = sub;
    }
</script>
</body>
</html>
