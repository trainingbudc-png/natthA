<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2 | ยืนยันรับเครื่อง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- 📌 อ้างอิงไฟล์ CSS กลาง -->
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        .info-box { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .info-label { font-size: 0.85rem; color: #64748b; margin-bottom: 2px; }
        .info-value { font-size: 1.1rem; font-weight: bold; }
        .divider { width: 1px; background-color: #cbd5e1; height: 40px; }
    </style>
</head>
<body>
<div class="container-wide">
    <div class="card-custom">
        <h4 class="text-center fw-bold text-dark mb-4">📋 [Step 2] ตรวจสอบอุปกรณ์ก่อนรับ</h4>
        
        <div class="info-box d-flex justify-content-around align-items-center">
            <div class="text-center">
                <div class="info-label">👤 ผู้ขอเบิกยืม:</div>
                <div id="displayUserName" class="info-value text-primary">กำลังโหลด...</div>
            </div>
            <div class="divider"></div>
            <div class="text-center">
                <div class="info-label">👨‍💻 แอดมินผู้เตรียม:</div>
                <div id="displayAdminName" class="info-value text-success">กำลังโหลด...</div>
            </div>
        </div>

        <div class="table-wrapper mb-3">
            <table class="table">
                <thead>
                    <tr>
                        <th>iPad</th>
                        <th>Drive</th>
                        <th>File</th>
                        <th>Img</th>
                        <th>Safari</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="itemList">
                    <tr><td colspan="6" class="text-muted py-3 text-center">กำลังโหลดข้อมูล... ⏳</td></tr>
                </tbody>
            </table>
        </div>
        
        <textarea id="reportNote" class="form-control mb-3" rows="2" placeholder="หมายเหตุเพิ่มเติม (ถ้ามี)..."></textarea>
        
        <button id="btnSubmit" class="btn-custom btn-success-custom" onclick="submitReceipt()" disabled>✅ ยืนยันการรับเครื่อง</button>
        <button class="btn-custom btn-outline-custom mt-3" onclick="window.location.href='user.html'">⬅️ กลับหน้าหลัก</button>
    </div>
</div>

<!-- 📌 โหลดไฟล์ Scripts -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script.js"></script>

<script>
    const reqId = new URLSearchParams(window.location.search).get('reqId');
    const currentLoggerName = localStorage.getItem("userName") || "ผู้ใช้งาน";

    window.onload = async function() {
        if (!reqId) {
            Swal.fire("ข้อผิดพลาด", "ไม่พบเลขรายการ กรุณาเข้าผ่านหน้าหลัก", "error").then(() => window.location.href = "user.html");
            return;
        }
        
        try {
            // เรียกใช้ API ผ่านฟังก์ชันกลาง callAPI()
            const res = await callAPI({ action: "getStep1Data", reqId: reqId });
            
            document.getElementById('displayUserName').innerText = res.userName || "ไม่ระบุ";
            document.getElementById('displayAdminName').innerText = res.adminName || "ไม่ระบุ";

            const tbody = document.getElementById('itemList');
            tbody.innerHTML = ""; 

            if (res.data && res.data.length > 0) {
                res.data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold"><input type="checkbox" class="select-ipad me-2 check-item" id="btn-${item.ipadId}" onchange="validateForm()"> <label for="btn-${item.ipadId}" style="cursor:pointer; color: #0ea5e9;">${item.ipadId}</label></td>
                            <td><input type="checkbox" class="check-app check-item" onchange="validateForm()"></td>
                            <td><input type="checkbox" class="check-app check-item" onchange="validateForm()"></td>
                            <td><input type="checkbox" class="check-app check-item" onchange="validateForm()"></td>
                            <td><input type="checkbox" class="check-app check-item" onchange="validateForm()"></td>
                            <td><button type="button" class="btn btn-sm btn-outline-primary fw-bold rounded-pill" onclick="tickAll(this)">✔ ติ๊กครบ</button></td>
                        </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" class="text-danger py-3 text-center">❌ ไม่พบรายการเครื่อง</td></tr>';
            }
        } catch (error) {
            console.error(error);
            document.getElementById('itemList').innerHTML = '<tr><td colspan="6" class="text-danger py-3 text-center">❌ โหลดข้อมูลล้มเหลว</td></tr>';
        }
    };

    function tickAll(btn) {
        const row = btn.closest('tr');
        row.querySelector('.select-ipad').checked = true;
        row.querySelectorAll('.check-app').forEach(cb => cb.checked = true);
        validateForm();
    }

    function validateForm() {
        document.getElementById('btnSubmit').disabled = document.querySelectorAll('.select-ipad:checked').length === 0;
    }

    async function submitReceipt() {
        const btn = document.getElementById('btnSubmit');
        btn.innerHTML = "กำลังบันทึกข้อมูล... ⏳"; 
        btn.disabled = true;
        
        let items = [];
        document.querySelectorAll('.select-ipad:checked').forEach(ipad => {
            const row = ipad.closest('tr');
            // เปลี่ยนค่าที่ส่งไปให้เป็น ☑ หรือ ☐[cite: 19]
            const checks = Array.from(row.querySelectorAll('.check-app')).map(c => c.checked ? "☑" : "☐");
            items.push({ ipadId: row.querySelector('label').innerText, checklist: checks.join(",") });
        });

        try {
            await callAPI({ 
                action: "updateStatus", 
                reqId: reqId, 
                items: items, 
                note: document.getElementById('reportNote').value, 
                name: currentLoggerName 
            });
            
            // แจ้งเตือนสำเร็จแล้วเด้งกลับหน้า User ทันที
            Swal.fire({
                title: "สำเร็จ!",
                text: "บันทึกข้อมูลรับเครื่องเรียบร้อยแล้ว",
                icon: "success",
                confirmButtonColor: "#10b981"
            }).then(() => {
                window.location.href = "user.html"; 
            });

        } catch (error) {
            Swal.fire("ผิดพลาด", "เกิดข้อผิดพลาดในการบันทึกข้อมูล", "error");
            btn.innerHTML = "✅ ยืนยันการรับเครื่อง";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
