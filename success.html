<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการสำเร็จ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #f4f7f9; 
            font-family: 'Kanit', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px; 
        }
        
        .card-container {
            background: #ffffff;
            width: 100%; max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .success-circle {
            width: 72px; height: 72px;
            background: #ecfdf5; color: #059669;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 20px;
        }

        .main-title { font-size: 1.4rem; font-weight: 600; color: #111827; margin-bottom: 8px; }
        .sub-title { font-size: 0.95rem; color: #6b7280; margin-bottom: 30px; }

        /* ปรับดีไซน์ส่วน Summary ให้ดูพรีเมียม */
        .summary-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            margin-bottom: 30px;
        }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .summary-label { color: #6b7280; font-weight: 400; }
        .summary-value { color: #111827; font-weight: 500; }

        .btn-main { background: #059669; color: white; border-radius: 12px; padding: 14px; font-weight: 500; width: 100%; border: none; margin-bottom: 10px; transition: 0.2s; }
        .btn-main:hover { background: #047857; color: white; }
        .btn-sub { background: #f3f4f6; color: #374151; border-radius: 12px; padding: 14px; font-weight: 500; width: 100%; border: none; transition: 0.2s; }
        .btn-sub:hover { background: #e5e7eb; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="success-circle">✓</div>
    <div class="main-title" id="msgTitle">เตรียมเครื่องสำเร็จ</div>
    <div class="sub-title" id="msgDesc">บันทึกข้อมูลเข้าระบบเรียบร้อยแล้ว</div>

    <div id="summaryArea" class="summary-box" style="display:none;">
        <div id="summaryContent"></div>
    </div>

    <button class="btn-main" onclick="closeApp()">ปิดหน้าต่างนี้</button>
    <button class="btn-sub" onclick="goHome()">กลับเมนูหลัก</button>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const MY_LIFF_ID = "2010557323-PAyWhGxW"; 
    let homeUrl = localStorage.getItem("userRole") === "Admin" ? "admin.html" : "user.html";
    
    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('title')) document.getElementById('msgTitle').innerText = urlParams.get('title');
        if (urlParams.get('desc')) document.getElementById('msgDesc').innerText = urlParams.get('desc');
        
        const summary = urlParams.get('summary');
        if (summary) {
            document.getElementById('summaryArea').style.display = 'block';
            const lines = summary.split('\n');
            let html = "";
            lines.forEach(line => {
                const parts = line.split(': ');
                if(parts.length === 2) {
                    html += `<div class="summary-item"><span class="summary-label">${parts[0]}</span><span class="summary-value">${parts[1]}</span></div>`;
                } else {
                    html += `<div class="summary-item">${line}</div>`;
                }
            });
            document.getElementById('summaryContent').innerHTML = html;
        }
        try { await liff.init({ liffId: MY_LIFF_ID }); } catch (err) {}
    };

    function closeApp() { liff.isInClient() ? liff.closeWindow() : window.location.href = homeUrl; }
    function goHome() { window.location.href = homeUrl; }
</script>
</body>
</html>
