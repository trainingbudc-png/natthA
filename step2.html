<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ยืนยันรับอุปกรณ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Sarabun', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .confirm-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .status-badge { background: #e0f2fe; color: #0284c7; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="confirm-box">
    <h5>ยืนยันการรับเครื่อง</h5>
    <div class="my-4">
        <span class="status-badge" id="reqIdText">กำลังโหลดรายการ...</span>
    </div>
    <p>กดปุ่มด้านล่างเพื่อยืนยันว่าได้รับอุปกรณ์เรียบร้อยแล้ว</p>
    <button id="btnConfirm" class="btn btn-success w-100 py-3 mt-3" onclick="confirmReceipt()">✅ ยืนยันการรับเครื่อง</button>
</div>

<script>
    // ดึง reqId จาก URL ทันที
    const urlParams = new URLSearchParams(window.location.search);
    const reqId = urlParams.get('reqId');
    document.getElementById('reqIdText').innerText = reqId;

    async function confirmReceipt() {
        const btn = document.getElementById('btnConfirm');
        btn.innerText = "กำลังบันทึก...";
        btn.disabled = true;

        // เรียกใช้ฟังก์ชันผ่าน API ชุดเดิมที่มีอยู่ (ไม่ต้องสร้างใหม่)
        fetch("https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec", {
            method: "POST",
            body: JSON.stringify({ 
                action: "updateStatus", 
                reqId: reqId, 
                name: "ผู้ใช้ยืนยันผ่านมือถือ", 
                status: "รับเครื่องแล้ว" 
            })
        }).then(() => {
            alert("ยืนยันเรียบร้อยแล้วครับ!");
            window.location.href = "index.html";
        });
    }
</script>
</body>
</html>
