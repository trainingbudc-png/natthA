<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 5 | ตรวจสอบคืนเครื่อง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #e0f2f1; font-family: 'Kanit', sans-serif; padding: 20px; }
        
        /* สไตล์กล่องหัวข้อหลัก */
        .main-header-card { background: white; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: auto; max-width: 900px; margin-bottom: 20px; }
        .main-header-card h3 { color: #1e293b; font-weight: 600; margin: 0; font-size: 1.6rem; }
        
        .confirm-card { background: white; padding: 0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); max-width: 900px; margin: auto; overflow: hidden; }
        
        /* สไตล์หัวตารางสีเขียวอมฟ้าตามรูป */
        .teal-header { background-color: #00897b; color: white; padding: 15px 20px; font-weight: 600; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
        .req-id-badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 8px; font-size: 0.9rem; }
        
        /* กล่องแสดงข้อมูลคนเบิก-คนให้ยืม */
        .info-panel { padding: 15px 20px; background: #f1f8f7; border-bottom: 1px solid #b2dfdb; display: flex; justify-content: space-around; align-items: center; }
        .info-label { font-size: 0.85rem; color: #00695c; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 1.1rem; font-weight: bold; color: #004d40; }
        .divider { width: 1px; background-color: #b2dfdb; height: 40px; }

        .table { margin-bottom: 0 !important; border-collapse: collapse; }
        .table th { font-size: 0.9rem; vertical-align: middle; text-align: center; color: #4b5563; background: white; padding: 15px 10px; border-bottom: 2px solid #e2e8f0; font-weight: normal; }
        .table td { vertical-align: middle; text-align: center; padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
        
        .check-item { width: 22px; height: 22px; cursor: pointer; accent-color: #00897b; }
        
        .btn-shortcut { background: #e0f2f1; color: #00695c; border: none; font-size: 0.8rem; font-weight: bold; padding: 6px 12px; border-radius: 6px; transition: 0.2s; }
        .btn-shortcut:hover { background: #b2dfdb; }
        
        .btn-confirm { background: #00897b; color: white; border-radius: 12px; padding: 15px; font-weight: bold; width: calc(100% - 40px); margin: 20px; border: none; transition: 0.3s; font-size: 1.1rem; }
        .btn-confirm:hover { background: #00695c; }
    </style>
</head>
<body>

<div class="main-header-card">
    <h3>5. [ ผู้ตรวจสอบ ] Check List iPad</h3>
</div>

<div class="confirm-card">
    <div class="teal-header">
        <span>iPad ที่ยืม</span>
        <span class="req-id-badge" id="headerReqId">รายการ: Loading...</span>
    </div>
    
    <div class="info-panel">
        <div class="text-center">
            <div class="info-label">👤 ผู้ขอเบิกยืม</div>
            <div id="displayUserName" class="info-value">กำลังโหลด...</div>
        </div>
        <div class="divider"></div>
        <div class="text-center">
            <div class="info-label">👨‍💻 แอดมินผู้เตรียม</div>
            <div id="displayAdminName" class="info-value">กำลังโหลด...</div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th style="text-align: left; padding-left: 20px;">เครื่องที่</th>
                    <th>เช็ค Google Drive</th>
                    <th>เช็คแอพ File</th>
                    <th>เช็คแอพ รูปภาพ</th>
                    <th>เช็คแอพ Safari</th>
                    <th>ปุ่มลัด</th>
                </tr>
            </thead>
            <tbody id="itemList">
                <tr><td colspan="6" class="text-muted py-4 text-center">กำลังโหลดข้อมูลเครื่อง...</td></tr>
            </tbody>
        </table>
    </div>

    <button class="btn btn-confirm" onclick="submitCheck()">💾 ยืนยันการตรวจสอบเครื่องเสร็จสมบูรณ์</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    const reqId = new URLSearchParams(window.location.search).get('reqId');

    window.onload = function() {
        if(!reqId) { alert("ไม่พบเลขรายการ"); return; }
        document.getElementById('headerReqId').innerText = "รายการ: " + reqId;

        // ดึงข้อมูลรายการเครื่อง พร้อมกับชื่อผู้เบิกและผู้เตรียม
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getStep1Data", reqId: reqId }) })
        .then(res => res.json())
        .then(res => {
            // เอาชื่อมาแสดงบนหน้าจอ
            document.getElementById('displayUserName').innerText = res.userName || "ไม่ระบุ";
            document.getElementById('displayAdminName').innerText = res.adminName || "ไม่ระบุ";

            const tbody = document.getElementById('itemList');
            tbody.innerHTML = "";
            
            if(res.data && res.data.length > 0) {
                res.data.forEach((item) => {
                    tbody.innerHTML += `<tr data-ipad="${item.ipadId}">
                        <td class="fw-bold text-dark" style="text-align: left; padding-left: 20px;">${item.ipadId}</td>
                        <td><input type="checkbox" class="check-item form-check-input"></td>
                        <td><input type="checkbox" class="check-item form-check-input"></td>
                        <td><input type="checkbox" class="check-item form-check-input"></td>
                        <td><input type="checkbox" class="check-item form-check-input"></td>
                        <td><button type="button" class="btn btn-shortcut" onclick="checkAllInRow(this)">✔ ติ๊กครบ</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" class="text-danger py-4 text-center">❌ ไม่พบรายการเครื่อง</td></tr>';
            }
        });
    };

    function checkAllInRow(btn) {
        const row = btn.closest('tr');
        row.querySelectorAll('.check-item').forEach(cb => cb.checked = true);
    }

    async function submitCheck() {
        const btn = document.querySelector('.btn-confirm');
        btn.innerText = "⏳ กำลังบันทึกข้อมูล...";
        btn.disabled = true;

        let items = [];
        document.querySelectorAll('#itemList tr[data-ipad]').forEach(row => {
            const checks = Array.from(row.querySelectorAll('.check-item')).map(c => c.checked ? "☑" : "☐");
            items.push({ ipadId: row.dataset.ipad, checks: checks });
        });

        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "saveStep5", 
                    reqId: reqId, 
                    items: items,
                    // ดึงชื่อแอดมินคนที่กำลังทำรายการตรวจเครื่องเพื่อเก็บเป็น Log
                    name: localStorage.getItem("userName") || "Admin" 
                })
            });

            // Redirect ไปหน้า Success
            const summary = `เลขรายการ: ${reqId}\nสถานะ: ตรวจสอบและเคลียร์เครื่องเสร็จสิ้น\nจำนวนเครื่อง: ${items.length} เครื่อง`;
            window.location.href = `success.html?title=ตรวจสอบเสร็จสิ้น&desc=บันทึกผลการตรวจสอบลงระบบเรียบร้อยแล้ว&summary=${encodeURIComponent(summary)}`;
            
        } catch (error) {
            alert("❌ เกิดข้อผิดพลาดในการบันทึก");
            btn.innerText = "💾 ยืนยันการตรวจสอบเครื่องเสร็จสมบูรณ์";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
