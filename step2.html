<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตรวจสอบและยืนยันรับเครื่อง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: 'Kanit', sans-serif; padding: 20px; }
        .confirm-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 850px; margin: auto; }
        .btn-confirm { background: #10b981; color: white; border-radius: 12px; padding: 15px; font-weight: bold; width: 100%; margin-top: 20px; }
        .info-box { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .info-label { font-size: 0.85rem; color: #64748b; margin-bottom: 2px; }
        .info-value { font-size: 1.1rem; font-weight: bold; }
        .divider { width: 1px; background-color: #cbd5e1; height: 40px; }
    </style>
</head>
<body>
<div class="confirm-card">
    <h4 class="text-center fw-bold text-dark mb-4">📋 [Step2] ตรวจสอบอุปกรณ์ก่อนรับ 📋</h4>
    
    <!-- กล่องแสดงข้อมูลผู้เบิกและแอดมิน -->
    <div class="info-box d-flex justify-content-around align-items-center">
        <div class="text-center">
            <div class="info-label">👤 ผู้ขอเบิกยืม:</div>
            <div id="displayUserName" class="info-value text-primary">กำลังโหลด...</div>
        </div>
        <div class="divider"></div>
        <div class="text-center">
            <div class="info-label">👨‍💻 แอดมินผู้เตรียม:</div>
            <div id="displayAdminName" class="info-value text-success">กำลังโหลด...</div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered text-center align-middle">
            <thead class="table-light">
                <tr><th>iPad</th><th>Drive</th><th>File</th><th>Img</th><th>Safari</th><th>ปุ่มลัด</th></tr>
            </thead>
            <tbody id="itemList">
                <tr><td colspan="6" class="text-muted py-3">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>
    <textarea id="reportNote" class="form-control mt-3" rows="2" placeholder="หมายเหตุเพิ่มเติม (ถ้ามี)..."></textarea>
    <button id="btnSubmit" class="btn btn-confirm" onclick="submitReceipt()" disabled>✅ ยืนยันการรับเครื่อง</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    const reqId = new URLSearchParams(window.location.search).get('reqId');

    // ตัวแปรเก็บชื่อผู้ใช้ที่กำลังล็อกอินอยู่ เพื่อส่งไปบันทึกตอนรับเครื่อง
    const currentLoggerName = localStorage.getItem("userName") || "ผู้ใช้งาน";

    fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getStep1Data", reqId: reqId }) })
    .then(res => res.json())
    .then(res => {
        // แสดงชื่อผู้เบิกและแอดมิน
        document.getElementById('displayUserName').innerText = res.userName || "ไม่ระบุ";
        document.getElementById('displayAdminName').innerText = res.adminName || "ไม่ระบุ";

        const tbody = document.getElementById('itemList');
        tbody.innerHTML = ""; // ล้างข้อความกำลังโหลด

        if(res.data && res.data.length > 0) {
            res.data.forEach(item => {
                tbody.innerHTML += `<tr>
                    <td class="fw-bold"><input type="checkbox" class="select-ipad me-2" id="btn-${item.ipadId}" onchange="validateForm()"> <label for="btn-${item.ipadId}" style="cursor:pointer;">${item.ipadId}</label></td>
                    <td><input type="checkbox" class="check-app form-check-input" onchange="validateForm()"></td>
                    <td><input type="checkbox" class="check-app form-check-input" onchange="validateForm()"></td>
                    <td><input type="checkbox" class="check-app form-check-input" onchange="validateForm()"></td>
                    <td><input type="checkbox" class="check-app form-check-input" onchange="validateForm()"></td>
                    <td><button type="button" class="btn btn-success btn-sm fw-bold" onclick="tickAll(this)">✔ ติ๊กครบ</button></td>
                </tr>`;
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="6" class="text-danger py-3">❌ ไม่พบรายการเครื่อง</td></tr>';
        }
    });

    function tickAll(btn) {
        const row = btn.closest('tr');
        row.querySelector('.select-ipad').checked = true;
        row.querySelectorAll('.check-app').forEach(cb => cb.checked = true);
        validateForm();
    }

    function validateForm() {
        document.getElementById('btnSubmit').disabled = document.querySelectorAll('.select-ipad:checked').length === 0;
    }

    async function submitReceipt() {
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "กำลังบันทึกข้อมูล..."; 
        btn.disabled = true;
        
        let items = [];
        document.querySelectorAll('.select-ipad:checked').forEach(ipad => {
            const row = ipad.closest('tr');
            // เปลี่ยนค่าที่ส่งไปให้เป็น ☑ หรือ ☐[cite: 14]
            const checks = Array.from(row.querySelectorAll('.check-app')).map(c => c.checked ? "☑" : "☐");
            items.push({ ipadId: row.querySelector('label').innerText, checklist: checks.join(",") });
        });

        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "updateStatus", 
                    reqId: reqId, 
                    items: items, 
                    note: document.getElementById('reportNote').value, 
                    name: currentLoggerName 
                })
            });
            alert("✅ บันทึกข้อมูลรับเครื่องเรียบร้อยแล้ว!"); 
            window.location.href = "user.html"; // หรือใช้ window.close();
        } catch (error) {
            alert("❌ เกิดข้อผิดพลาดในการบันทึกข้อมูล");
            btn.innerText = "✅ ยืนยันการรับเครื่อง";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
