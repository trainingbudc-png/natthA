<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการรอตรวจสอบคืนเครื่อง - Step 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fdf2f2; padding: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(220,53,69,0.05); }
        .table th { background-color: #dc3545; color: white; font-weight: 600; text-align: center; border-bottom: none; }
        .table td { vertical-align: middle; text-align: center; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; background-color: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
        .btn-check-ipad { background-color: #dc3545; color: white; border: none; font-weight: bold; }
        .btn-check-ipad:hover { background-color: #b91c1c; color: white; }

        /* 📱 รองรับมือถือ: เปลี่ยนตารางเป็นการ์ดเรียงต่อกัน */
        @media screen and (max-width: 768px) {
            .table-responsive { border: none !important; background: transparent !important; padding: 0 !important; }
            .table thead { display: none; }
            .table tbody tr { display: block; background: white; border-radius: 12px; margin-bottom: 15px; padding: 15px; box-shadow: 0 4px 12px rgba(220,53,69,0.1); border: 1px solid #fecaca; }
            .table tbody td { display: flex; justify-content: space-between; align-items: flex-start; text-align: right; padding: 10px 0; border-bottom: 1px dashed #fee2e2; }
            .table tbody td:last-child { border-bottom: none; padding-bottom: 0; }
            .table tbody td::before { content: attr(data-label); font-weight: 600; color: #b91c1c; font-size: 0.95rem; text-align: left; margin-right: 15px; flex-shrink: 0; }
            .btn-sm { padding: 10px !important; margin-top: 5px; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container my-4" style="max-width: 1000px;">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <!-- 📌 เปลี่ยนสีหัวข้อเป็นสีดำ (text-dark) -->
        <h3 class="text-dark fw-bold mb-0">📋 Step 5 | ตรวจสอบคืน (ค้างดำเนินการ)</h3>
        <a href="admin.html" class="btn btn-outline-danger px-4 fw-bold rounded-pill border-2">🔙 กลับหน้าแอดมิน</a>
    </div>

    <div class="card p-3 p-md-4 border border-danger border-opacity-25">
        <div class="table-responsive">
            <table class="table table-hover table-striped">
                <thead>
                    <tr>
                        <th style="width: 15%; border-top-left-radius: 8px;">เลขรายการ</th>
                        <th style="width: 20%;">วัน-เวลาที่ส่งคืน</th>
                        <th style="width: 25%;">ชื่อผู้ส่งคืน</th>
                        <th style="width: 13%;">จำนวน</th>
                        <th style="width: 12%;">สถานะ</th>
                        <th style="width: 15%; border-top-right-radius: 8px;">การจัดการ</th>
                    </tr>
                </thead>
                <tbody id="requestListBody">
                    <tr>
                        <td colspan="6" class="text-muted py-4 text-center">กำลังดึงข้อมูลรายการส่งคืนจากระบบ...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    let pendingRequests = [];

    // ฟังก์ชันช่วยแปลงเวลาดิบ ให้เป็นเวลาไทยอ่านง่าย
    function formatThaiDate(isoString) {
        if (!isoString || isoString === "-" || isoString.includes("Z") === false) return isoString; 
        try {
            const dateObj = new Date(isoString);
            return dateObj.toLocaleString('th-TH', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            }) + ' น.';
        } catch(e) {
            return isoString; // ถ้าแปลงพัง ให้แสดงค่าเดิม
        }
    }

    window.onload = async function() {
        try {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getData" }) });
            const result = await res.json();
            const tbody = document.getElementById("requestListBody");
            tbody.innerHTML = "";

            if (result.status === "success" && result.data.length > 0) {
                pendingRequests = result.data.filter(item => item.status === "Step[4]" || item.status === "ส่งคืนแล้ว");

                if (pendingRequests.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-success text-center fw-bold py-4">🎉 ไม่มีรายการส่งคืนที่ค้างตรวจสอบในขณะนี้</td></tr>';
                    return;
                }

                pendingRequests.forEach((req, idx) => {
                    const countText = req.note ? req.note.replace(/[^0-9]/g, '') : "1";
                    const count = parseInt(countText) || 1;

                    const displayTime = formatThaiDate(req.timestamp);

                    const tr = document.createElement("tr");
                    // 📌 เปลี่ยนสีชื่อผู้ส่งคืนเป็นสีดำ (text-dark)
                    tr.innerHTML = `
                        <td data-label="เลขรายการ"><span class="badge bg-dark fs-6">${req.reqId}</span></td> 
                        <td data-label="วัน-เวลา">${displayTime}</td>
                        <td data-label="ผู้ส่งคืน" class="fw-bold text-dark text-md-center text-end">${req.name}</td>
                        <td data-label="จำนวน"><span class="badge bg-secondary fs-6">${count} เครื่อง</span></td>
                        <td data-label="สถานะ"><span class="status-badge">${req.status}</span></td>
                        <td data-label="จัดการ">
                            <button class="btn btn-check-ipad btn-sm px-3 shadow-sm rounded-pill w-100" onclick="proceedToCheck('${req.reqId}')">
                                🔍 ตรวจสอบเครื่อง
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" class="text-danger text-center py-4">❌ ไม่พบข้อมูลการเบิกในระบบ หรือเกิดข้อผิดพลาด</td></tr>';
            }
        } catch (error) {
            document.getElementById("requestListBody").innerHTML = '<tr><td colspan="6" class="text-danger text-center py-4">❌ เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล</td></tr>';
        }
    };

    function proceedToCheck(reqId) {
        window.location.href = `step5.html?reqId=${reqId}`;
    }
</script>
</body>
</html>
