<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 4 | ส่งคืนเครื่อง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- 📌 อ้างอิงไฟล์ CSS กลาง -->
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        /* สไตล์กล่องข้อมูลด้านบน ธีมสีม่วง */
        .purple-header { background-color: #f5f3ff; border: 1px solid #ede9fe; border-left: 5px solid #8b5cf6; border-radius: 12px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-around; align-items: center; }
        .info-label { font-size: 0.85rem; color: #7c3aed; margin-bottom: 2px; font-weight: 600; }
        .info-value { font-size: 1.1rem; font-weight: bold; color: #5b21b6; }
        .divider { width: 1px; background-color: #ddd6fe; height: 40px; }
        
        /* ขยายตารางให้เลื่อนง่ายบนมือถือ */
        .table th { min-width: 90px; }
    </style>
</head>
<body>

<div class="container-wide">
    <div class="card-custom">
        <h4 class="text-center fw-bold text-dark mb-4" style="color: #6d28d9 !important;">📥 [Step 4] ส่งคืนเครื่องหลังสอบ</h4>
        
        <!-- กล่องข้อมูลผู้ส่งคืน -->
        <div class="purple-header">
            <div class="text-center">
                <div class="info-label">🔖 เลขรายการ</div>
                <div id="displayReqIdBox" class="info-value">กำลังโหลด...</div>
            </div>
            <div class="divider"></div>
            <div class="text-center">
                <div class="info-label">👤 ผู้ส่งคืน</div>
                <div id="displayUserName" class="info-value">กำลังโหลด...</div>
            </div>
        </div>

        <!-- ตารางเช็คลิสต์ -->
        <div class="table-wrapper mb-4">
            <table class="table">
                <thead>
                    <tr>
                        <th>เครื่องที่</th>
                        <th>เช็คแอพ<br>File</th>
                        <th>เช็คแอพ<br>รูปภาพ</th>
                        <th>เช็คแอพ<br>Safari</th>
                        <th>เช็ค<br>Wi-Fi</th>
                        <th>เช็ค<br>Bluetooth</th>
                        <th>เช็ค<br>AirDrop</th>
                        <th>เช็ค<br>Drive</th>
                        <th>ลบ<br>WI-FI</th>
                        <th>ปุ่มลัด</th>
                    </tr>
                </thead>
                <tbody id="itemList">
                    <tr><td colspan="10" class="text-muted py-4 text-center">กำลังโหลดข้อมูล... ⏳</td></tr>
                </tbody>
            </table>
        </div>

        <button id="btnSubmitStep4" class="btn-custom" onclick="submitReturn()" style="background-color: #8b5cf6; color: white;">💾 ยืนยันการส่งคืนเครื่องทั้งหมด</button>
        <button class="btn-custom btn-outline-custom mt-3" onclick="window.location.href='user.html'">⬅️ กลับหน้าหลัก</button>
    </div>
</div>

<!-- 📌 โหลดไฟล์ Scripts -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script.js"></script>

<script>
    const reqId = new URLSearchParams(window.location.search).get('reqId');
    const currentLoggerName = localStorage.getItem("userName") || "User";

    window.onload = async function() {
        if(!reqId) { 
            Swal.fire("ข้อผิดพลาด", "ไม่พบเลขรายการ", "error").then(() => window.location.href = "user.html");
            return; 
        }
        
        document.getElementById('displayReqIdBox').innerText = reqId;
        document.getElementById('displayUserName').innerText = currentLoggerName;

        try {
            // ดึงข้อมูลผ่าน callAPI() จาก script.js
            const res = await callAPI({ action: "getStep2Data", reqId: reqId });
            const tbody = document.getElementById('itemList');
            tbody.innerHTML = "";
            
            if(res.data && res.data.length > 0) {
                res.data.forEach((item) => {
                    tbody.innerHTML += `<tr data-ipad="${item.ipadId}">
                        <td class="fw-bold text-primary">${item.ipadId}</td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><input type="checkbox" class="check-item"></td>
                        <td><button type="button" class="btn btn-outline-primary btn-sm fw-bold rounded-pill px-3" onclick="checkAllInRow(this)">✔ ติ๊กครบ</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="10" class="text-danger py-4 text-center">❌ ไม่พบรายการเครื่อง</td></tr>';
            }
        } catch (error) {
            document.getElementById('itemList').innerHTML = '<tr><td colspan="10" class="text-danger py-4 text-center">❌ โหลดข้อมูลล้มเหลว</td></tr>';
        }
    };

    function checkAllInRow(btn) {
        const row = btn.closest('tr');
        row.querySelectorAll('.check-item').forEach(cb => cb.checked = true);
    }

    async function submitReturn() {
        const btn = document.getElementById('btnSubmitStep4');
        btn.innerHTML = "⏳ กำลังบันทึก...";
        btn.disabled = true;

        let items = [];
        document.querySelectorAll('#itemList tr[data-ipad]').forEach(row => {
            const checks = Array.from(row.querySelectorAll('.check-item')).map(c => c.checked ? "☑" : "☐");
            items.push({ ipadId: row.dataset.ipad, checks: checks });
        });

        try {
            const result = await callAPI({ 
                action: "saveStep4", 
                reqId: reqId, 
                items: items,
                name: currentLoggerName
            });

            if (result.status === "success") {
                const summary = `เลขรายการ: ${reqId}\nจำนวนเครื่องที่คืน: ${items.length}`;
                // ส่งไปหน้า Success เพื่อโชว์ความสำเร็จแบบหล่อๆ[cite: 11]
                window.location.href = `success.html?title=ส่งคืนเครื่องสำเร็จ&desc=ระบบได้รับข้อมูลการคืนเครื่องแล้ว&summary=${encodeURIComponent(summary)}`;
            } else {
                Swal.fire("ผิดพลาด", result.message || "เกิดข้อผิดพลาด", "error");
                btn.innerHTML = "💾 ยืนยันการส่งคืนเครื่องทั้งหมด";
                btn.disabled = false;
            }
        } catch (error) {
            Swal.fire("ผิดพลาด", "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้", "error");
            btn.innerHTML = "💾 ยืนยันการส่งคืนเครื่องทั้งหมด";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
