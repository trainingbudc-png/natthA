<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบและยืนยันการรับอุปกรณ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: 'Sarabun', sans-serif; padding: 20px; }
        .confirm-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: auto; }
        .table { margin-top: 20px; }
        .btn-confirm { background: #10b981; color: white; border-radius: 12px; padding: 15px; font-weight: bold; width: 100%; margin-top: 20px; }
        .btn-confirm:disabled { background: #cbd5e1; }
    </style>
</head>
<body>

<div class="confirm-card">
    <h4 class="text-center fw-bold">📋 ตรวจสอบและรายงานปัญหา</h4>
    <p class="text-muted text-center small">กรุณาติ๊กตรวจสอบเครื่องของท่าน และแจ้งปัญหาหากพบข้อผิดพลาด</p>
    
    <table class="table table-bordered align-middle">
        <thead class="table-light">
            <tr><th>iPad ID</th><th>ตรวจสอบเอง</th></tr>
        </thead>
        <tbody id="itemList"></tbody>
    </table>

    <div class="mt-3">
        <label class="fw-bold small">💬 รายงานปัญหา (ไม่บังคับ):</label>
        <textarea id="reportNote" class="form-control" rows="2" placeholder="เช่น เครื่องมีรอยบุบ, จอติดขัด หรืออื่นๆ..."></textarea>
    </div>

    <div class="form-check mt-3">
        <input class="form-check-input" type="checkbox" id="checkFinal" onchange="document.getElementById('btnSubmit').disabled = !this.checked">
        <label class="form-check-label small" for="checkFinal">ข้าพเจ้ายืนยันผลการตรวจสอบตามที่ระบุไว้ข้างต้น</label>
    </div>

    <button id="btnSubmit" class="btn btn-confirm" onclick="submitReceipt()" disabled>✅ ยืนยันการรับเครื่อง</button>
</div>

<script>
    // ... ส่วนดึงข้อมูลคงเดิม แต่เปลี่ยนการแสดงผลใน tbody ...
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getStep1Data", reqId: reqId })
    })
    .then(res => res.json())
    .then(res => {
        const tbody = document.getElementById('itemList');
        res.data.forEach((item, index) => {
            tbody.innerHTML += `<tr>
                <td>${item.ipadId}</td>
                <td><input type="checkbox" class="form-check-input" required> ตรวจสอบแล้ว</td>
            </tr>`;
        });
    });

    async function submitReceipt() {
        const report = document.getElementById('reportNote').value; // ดึงข้อความจากช่องรายงาน
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "กำลังบันทึก...";
        
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "updateStatus", 
                reqId: reqId, 
                name: "ผู้ใช้ยืนยัน", 
                status: "รับเครื่องแล้ว",
                note: report ? `ปัญหา: ${report}` : "ปกติ" // ส่งข้อความรายงานไปที่ Google Sheets ด้วย
            })
        });
        alert("บันทึกข้อมูลเรียบร้อย!");
        window.close();
    }
</script>
</body>
</html>
