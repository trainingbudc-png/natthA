<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตรวจสอบและยืนยันรับเครื่อง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: 'Kanit', sans-serif; padding: 20px; }
        .confirm-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 850px; margin: auto; }
        .btn-confirm { background: #10b981; color: white; border-radius: 12px; padding: 15px; font-weight: bold; width: 100%; margin-top: 20px; }
        .btn-confirm:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-check:checked + .btn-outline-primary { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>

<div class="confirm-card">
    <h4 class="text-center fw-bold">📋 ตรวจสอบอุปกรณ์ก่อนรับ</h4>
    <p class="text-center text-muted">รายการ: <span id="reqIdDisp" class="fw-bold text-primary">กำลังโหลด...</span></p>

    <div class="table-responsive">
        <table class="table table-bordered align-middle text-center">
            <thead class="table-light">
                <tr><th>iPad</th><th>Drive</th><th>File</th><th>Img</th><th>Safari</th><th>ปุ่มลัด</th></tr>
            </thead>
            <tbody id="itemList"><tr><td colspan="6">กำลังโหลดข้อมูล...</td></tr></tbody>
        </table>
    </div>

    <textarea id="reportNote" class="form-control mt-3" rows="2" placeholder="แจ้งรอย, จอติดขัด หรือปัญหาอื่นๆ..."></textarea>
    <button id="btnSubmit" class="btn btn-confirm" onclick="submitReceipt()" disabled>✅ ยืนยันการรับเครื่อง</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    const reqId = new URLSearchParams(window.location.search).get('reqId');
    document.getElementById('reqIdDisp').innerText = reqId || "ไม่พบรายการ";

    fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getStep1Data", reqId: reqId }) })
    .then(res => res.json())
    .then(res => {
        const tbody = document.getElementById('itemList');
        tbody.innerHTML = "";
        res.data.forEach((item) => {
            tbody.innerHTML += `<tr>
                <td><input type="checkbox" class="btn-check select-ipad" id="btn-${item.ipadId}" onchange="validateForm()"><label class="btn btn-outline-primary btn-sm w-100" for="btn-${item.ipadId}">${item.ipadId}</label></td>
                <td><input type="checkbox" class="form-check-input check-app" onchange="validateForm()"></td>
                <td><input type="checkbox" class="form-check-input check-app" onchange="validateForm()"></td>
                <td><input type="checkbox" class="form-check-input check-app" onchange="validateForm()"></td>
                <td><input type="checkbox" class="form-check-input check-app" onchange="validateForm()"></td>
                <td><button type="button" class="btn btn-success btn-sm w-100" onclick="tickAll(this)">✅ ติ๊กครบ</button></td>
            </tr>`;
        });
    });

    function tickAll(btn) {
        const row = btn.closest('tr');
        row.querySelector('.select-ipad').checked = true;
        row.querySelectorAll('.check-app').forEach(cb => cb.checked = true);
        validateForm();
    }

    function validateForm() {
        document.getElementById('btnSubmit').disabled = document.querySelectorAll('.select-ipad:checked').length === 0;
    }

    async function submitReceipt() {
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
        let items = [];
        document.querySelectorAll('.select-ipad:checked').forEach(ipad => {
            const row = ipad.closest('tr');
            const checks = Array.from(row.querySelectorAll('.check-app')).map(c => c.checked ? "OK" : "NO");
            items.push({ ipadId: row.querySelector('label').innerText, checklist: checks.join(",") });
        });

        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "updateStatus", reqId: reqId, items: items, note: document.getElementById('reportNote').value, name: "ผู้ใช้ยืนยันผ่านมือถือ" })
        });
        alert("บันทึกข้อมูลเรียบร้อย!"); window.close();
    }
</script>
</body>
</html>
