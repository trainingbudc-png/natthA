<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผู้ดูแลระบบ | ระบบ iPad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="user-status-floating">
        <p id="showName"></p>
    </div>

    <div class="container">
        <h2>เมนูผู้ดูแล (Admin)</h2>
        
        <div class="button-group">
            <button class="btn-admin" onclick="sendData('เตรียมเครื่อง', 'พร้อมใช้งาน')">Step 1 | เตรียม</button>
            <button class="btn-admin" onclick="sendData('ตรวจคืน', 'สภาพสมบูรณ์')">Step 5 | ตรวจ</button>
            <button class="btn-warning" onclick="sendData('ตรวจคืน', 'เครื่องมีปัญหา')">สถานะเครื่อง</button>
            <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
