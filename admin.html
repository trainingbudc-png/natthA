<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผู้ดูแลระบบ | ระบบ iPad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-bg">

    <nav class="top-navbar">
        <div class="nav-brand">
            <h2>📱 เมนูผู้ดูแล (Admin)</h2>
        </div>
        <div class="nav-user-area">
            <span id="showName" class="user-status-text"></span>
            <button class="btn-logout-nav" onclick="logout()">ออกจากระบบ</button>
        </div>	
    </nav>

    <div class="dashboard-wrapper">
        
        <div class="section-title">
            <div class="title-bar bar-red"></div>
            <h3>ระบบจัดการ iPad (เบิก-คืน)</h3>
        </div>

        <div class="card-grid">
            <button class="action-card card-red" onclick="sendData('เตรียมเครื่อง', 'พร้อมใช้งาน')">
                <div class="card-icon">📦</div>
                <div class="card-detail">
                    <h4>Step 1 | เตรียม</h4>
                    <p>เตรียมเครื่องให้พร้อมใช้งาน</p>
                </div>
            </button>

            <button class="action-card card-red" onclick="sendData('ตรวจคืน', 'สภาพสมบูรณ์')">
                <div class="card-icon">🔍</div>
                <div class="card-detail">
                    <h4>Step 5 | ตรวจ</h4>
                    <p>ตรวจสอบสภาพเครื่องหลังใช้งาน</p>
                </div>
            </button>
        </div>

        <br><br>

        <div class="section-title">
            <div class="title-bar bar-orange"></div>
            <h3>ระบบแจ้งเตือนปัญหา</h3>
        </div>

        <div class="card-grid">
            <button class="action-card card-orange" onclick="sendData('ตรวจคืน', 'เครื่องมีปัญหา')">
                <div class="card-icon">⚠️</div>
                <div class="card-detail">
                    <h4>สถานะเครื่องมีปัญหา</h4>
                    <p>อัปเดตสถานะกรณีพบความเสียหาย</p>
                </div>
            </button>
        </div>

    </div>
    
    <script src="script.js"></script>
<br><br>

        <div class="section-title" style="justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="title-bar" style="background-color: #28a745;"></div>
                <h3>ตารางสถานะ iPad (อัปเดตล่าสุด)</h3>
            </div>
            <button onclick="fetchStatusData()" class="btn-refresh">🔄 โหลดข้อมูลใหม่</button>
        </div>

        <div class="table-container">
            <table class="status-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>วัน-เวลาที่บันทึก</th>
                        <th>ผู้ดำเนินการ</th>
                        <th>รหัส iPad</th>
                        <th>สถานะ / ขั้นตอน</th>
                        <th>หมายเหตุ</th>
                    </tr>
                </thead>
                <tbody id="statusTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 20px;">กำลังโหลดข้อมูล... ⏳</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div> <script src="script.js"></script>
</body>
</html>
